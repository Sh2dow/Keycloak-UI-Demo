services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://${RDS_ENDPOINT}:5432/${RDS_KEYCLOAK_DB:-keycloak_demo}?sslmode=require
      KC_DB_USERNAME: ${RDS_USERNAME:-postgres}
      KC_DB_PASSWORD: ${RDS_PASSWORD}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    command: start-dev
    ports:
      - "8080:8080"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend_migrations:
    build:
      context: .
      dockerfile: backend/scripts/Dockerfile.migrations
    container_name: backend_migrations
    environment:
      AUTH_DB_CONNECTION_STRING: Host=${RDS_ENDPOINT};Port=5432;Database=${RDS_AUTH_DB:-keycloak_demo_auth};Username=${RDS_USERNAME:-postgres};Password=${RDS_PASSWORD}
      APP_DB_CONNECTION_STRING: Host=${RDS_ENDPOINT};Port=5432;Database=${RDS_APP_DB:-keycloak_demo_app};Username=${RDS_USERNAME:-postgres};Password=${RDS_PASSWORD}

  backend_auth_api:
    build:
      context: .
      dockerfile: backend/backend.Auth.Api/Dockerfile
    container_name: backend_auth_api
    depends_on:
      backend_migrations:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=${RDS_ENDPOINT};Port=5432;Database=${RDS_AUTH_DB:-keycloak_demo_auth};Username=${RDS_USERNAME:-postgres};Password=${RDS_PASSWORD}
    ports:
      - "5001:8080"

  backend_api:
    build:
      context: .
      dockerfile: backend/backend.Api/Dockerfile
    container_name: backend_api
    depends_on:
      backend_auth_api:
        condition: service_started
      backend_migrations:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=${RDS_ENDPOINT};Port=5432;Database=${RDS_APP_DB:-keycloak_demo_app};Username=${RDS_USERNAME:-postgres};Password=${RDS_PASSWORD}
      AuthService__BaseUrl: http://backend_auth_api:8080
      RabbitMq__Uri: amqp://guest:guest@rabbitmq:5672
      Keycloak__Authority: http://${PUBLIC_HOST:-localhost}:8080/realms/myrealm
      Keycloak__MetadataAddress: http://keycloak:8080/realms/myrealm/.well-known/openid-configuration
    ports:
      - "5000:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_KEYCLOAK_AUTHORITY: http://${PUBLIC_HOST:-localhost}:8080/realms/myrealm
    container_name: frontend
    depends_on:
      backend_api:
        condition: service_started
      keycloak:
        condition: service_started
    ports:
      - "5173:80"
