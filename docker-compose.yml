services:
  keycloak:
    build:
      context: .
      dockerfile: keycloak/Dockerfile
    container_name: keycloak
    environment:
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      RDS_ENDPOINT: ${RDS_ENDPOINT}
      RDS_USERNAME: ${RDS_USERNAME:-postgres}
      RDS_KEYCLOAK_DB: ${RDS_KEYCLOAK_DB:-keycloak_demo}
      RDS_MASTER_SECRET_ARN: ${RDS_MASTER_SECRET_ARN}
      KEYCLOAK_ADMIN_PASSWORD_PARAMETER_NAME: ${KEYCLOAK_ADMIN_PASSWORD_PARAMETER_NAME:-/keycloak-demo/keycloak/admin-password}
    ports:
      - "8080:8080"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend_migrations:
    build:
      context: .
      dockerfile: backend/scripts/Dockerfile.migrations
    container_name: backend_migrations
    environment:
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      RDS_ENDPOINT: ${RDS_ENDPOINT}
      RDS_USERNAME: ${RDS_USERNAME:-postgres}
      RDS_AUTH_DB: ${RDS_AUTH_DB:-keycloak_demo_auth}
      RDS_APP_DB: ${RDS_APP_DB:-keycloak_demo_app}
      RDS_MASTER_SECRET_ARN: ${RDS_MASTER_SECRET_ARN}

  backend_auth_api:
    build:
      context: .
      dockerfile: backend/backend.Auth.Api/Dockerfile
    container_name: backend_auth_api
    depends_on:
      backend_migrations:
        condition: service_completed_successfully
    environment:
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      RDS_ENDPOINT: ${RDS_ENDPOINT}
      RDS_USERNAME: ${RDS_USERNAME:-postgres}
      RDS_AUTH_DB: ${RDS_AUTH_DB:-keycloak_demo_auth}
      RDS_MASTER_SECRET_ARN: ${RDS_MASTER_SECRET_ARN}
    ports:
      - "5001:8080"

  backend_api:
    build:
      context: .
      dockerfile: backend/backend.Api/Dockerfile
    container_name: backend_api
    depends_on:
      backend_auth_api:
        condition: service_started
      backend_migrations:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      RDS_ENDPOINT: ${RDS_ENDPOINT}
      RDS_USERNAME: ${RDS_USERNAME:-postgres}
      RDS_APP_DB: ${RDS_APP_DB:-keycloak_demo_app}
      RDS_MASTER_SECRET_ARN: ${RDS_MASTER_SECRET_ARN}
      AuthService__BaseUrl: http://backend_auth_api:8080
      RabbitMq__Uri: amqp://guest:guest@rabbitmq:5672
      Keycloak__Authority: http://${PUBLIC_HOST:-localhost}:8080/realms/myrealm
      Keycloak__MetadataAddress: http://keycloak:8080/realms/myrealm/.well-known/openid-configuration
    ports:
      - "5000:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_KEYCLOAK_AUTHORITY: http://${PUBLIC_HOST:-localhost}:8080/realms/myrealm
    container_name: frontend
    depends_on:
      backend_api:
        condition: service_started
      keycloak:
        condition: service_started
    ports:
      - "5173:80"
